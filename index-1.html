<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clip Sequencer</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Instrument+Serif&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0c;
  --surface: #141418;
  --surface2: #1c1c22;
  --border: #2a2a33;
  --text: #e8e6e1;
  --text-dim: #8a8890;
  --accent: #c9f06b;
  --accent-dim: #4a5a20;
  --red: #f06b6b;
  --blue: #6bb8f0;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  min-height: 100vh;
}
.app-header {
  padding: 24px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
}
.app-title {
  font-family: 'Instrument Serif', serif;
  font-size: 28px;
  color: var(--accent);
}
.header-right {
  display: flex;
  align-items: center;
  gap: 16px;
}
.app-subtitle {
  color: var(--text-dim);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 2px;
}
.main-layout {
  display: grid;
  grid-template-columns: 1fr 380px;
  height: calc(100vh - 77px);
}
.player-area {
  padding: 32px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}
.player-wrapper {
  position: relative;
  width: 100%;
  aspect-ratio: 16/9;
  background: #000;
  border-radius: 8px;
  overflow: hidden;
  border: 1px solid var(--border);
}
#yt-frame {
  width: 100%;
  height: 100%;
  border: none;
  position: absolute;
  top: 0; left: 0;
}
#drive-player {
  width: 100%;
  height: 100%;
  position: absolute;
  top: 0; left: 0;
  display: none;
}
.player-placeholder {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 12px;
  color: var(--text-dim);
  z-index: 2;
  background: #000;
}
.player-placeholder svg { width: 48px; height: 48px; opacity: 0.3; }
.player-placeholder.hidden { display: none; }
.transport-bar {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 16px 20px;
  background: var(--surface);
  border-radius: 8px;
  border: 1px solid var(--border);
  flex-wrap: wrap;
}
.transport-bar button {
  background: none;
  border: 1px solid var(--border);
  color: var(--text);
  padding: 8px 14px;
  border-radius: 6px;
  cursor: pointer;
  font-family: inherit;
  font-size: 12px;
  transition: all 0.15s;
}
.transport-bar button:hover {
  background: var(--surface2);
  border-color: var(--accent);
  color: var(--accent);
}
.transport-bar button.active {
  background: var(--accent);
  color: var(--bg);
  border-color: var(--accent);
  font-weight: 600;
}
.transport-bar button.rec { border-color: var(--red); color: var(--red); }
.transport-bar button.rec:hover { background: rgba(240,107,107,0.15); }
.transport-bar button.rec.recording {
  background: var(--red);
  color: #fff;
  animation: pulse 1.2s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }
.info-display {
  color: var(--text-dim);
  font-size: 11px;
  margin-left: auto;
}
.timeline-strip {
  display: flex;
  gap: 4px;
  padding: 12px 20px;
  background: var(--surface);
  border-radius: 8px;
  border: 1px solid var(--border);
  overflow-x: auto;
  min-height: 52px;
  align-items: center;
}
.timeline-chip {
  padding: 6px 12px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 4px;
  font-size: 11px;
  white-space: nowrap;
  cursor: pointer;
  transition: all 0.15s;
  color: var(--text-dim);
  flex-shrink: 0;
}
.timeline-chip:hover { border-color: var(--accent); color: var(--text); }
.timeline-chip.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
.timeline-empty { color: var(--text-dim); font-size: 11px; opacity: 0.5; }
.sidebar {
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.sidebar-tabs { display: flex; border-bottom: 1px solid var(--border); }
.sidebar-tab {
  flex: 1;
  padding: 14px;
  text-align: center;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text-dim);
  cursor: pointer;
  border: none;
  background: none;
  transition: all 0.15s;
  border-bottom: 2px solid transparent;
}
.sidebar-tab:hover { color: var(--text); }
.sidebar-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.sidebar-content { flex: 1; overflow-y: auto; padding: 20px; }
.panel { display: none; }
.panel.active { display: block; }
.form-group { margin-bottom: 16px; }
.form-label {
  display: block;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text-dim);
  margin-bottom: 6px;
}
.form-input {
  width: 100%;
  padding: 10px 12px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-family: inherit;
  font-size: 12px;
  outline: none;
}
.form-input:focus { border-color: var(--accent); }
.form-input::placeholder { color: var(--text-dim); opacity: 0.5; }
.time-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.btn {
  width: 100%;
  padding: 12px;
  border: 1px solid var(--accent);
  background: transparent;
  color: var(--accent);
  font-family: inherit;
  font-size: 12px;
  font-weight: 600;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.15s;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.btn:hover { background: var(--accent); color: var(--bg); }
.btn-secondary { border-color: var(--border); color: var(--text-dim); }
.btn-secondary:hover { border-color: var(--text); color: var(--text); background: var(--surface2); }
.clip-list { display: flex; flex-direction: column; gap: 8px; }
.clip-item {
  padding: 12px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.15s;
}
.clip-item:hover { border-color: var(--accent); }
.clip-item.active { border-color: var(--accent); background: var(--accent-dim); }
.clip-item-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
.clip-item-title { font-weight: 600; font-size: 12px; }
.clip-item-badge {
  font-size: 9px; padding: 2px 6px; border-radius: 3px;
  text-transform: uppercase; letter-spacing: 1px;
}
.badge-yt { background: rgba(240,107,107,0.2); color: var(--red); }
.badge-drive { background: rgba(107,184,240,0.2); color: var(--blue); }
.clip-item-time { font-size: 11px; color: var(--text-dim); }
.clip-item-actions { display: flex; gap: 4px; margin-top: 8px; }
.clip-item-actions button {
  padding: 4px 8px; font-size: 10px; background: none;
  border: 1px solid var(--border); color: var(--text-dim);
  border-radius: 4px; cursor: pointer; font-family: inherit;
}
.clip-item-actions button:hover { border-color: var(--text); color: var(--text); }
.clip-item-actions button.del:hover { border-color: var(--red); color: var(--red); }
.tweak-section { margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border); }
.range-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.range-row input[type="range"] { flex: 1; accent-color: var(--accent); }
.range-val { font-size: 12px; color: var(--accent); min-width: 40px; text-align: right; }
.status-msg {
  font-size: 11px; color: var(--accent); text-align: center;
  margin-top: 8px; padding: 6px; min-height: 20px;
}
.status-msg.error { color: var(--red); }
.note-box {
  font-size: 11px; color: var(--text-dim); padding: 10px;
  background: var(--surface); border-radius: 6px;
  border: 1px solid var(--border); line-height: 1.5;
  margin-bottom: 16px;
}
@media (max-width: 900px) {
  .main-layout { grid-template-columns: 1fr; height: auto; }
  .sidebar { border-left: none; border-top: 1px solid var(--border); min-height: 400px; }
}
</style>
</head>
<body>

<header class="app-header">
  <div class="app-title">Clip Sequencer</div>
  <div class="app-subtitle">playlist controller</div>
</header>

<div class="main-layout">
  <div class="player-area">
    <div class="player-wrapper" id="player-wrapper">
      <iframe id="yt-frame" allow="autoplay; encrypted-media" allowfullscreen></iframe>
      <video id="drive-player" controls></video>
      <div class="player-placeholder" id="player-placeholder">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <polygon points="5 3 19 12 5 21 5 3"/>
        </svg>
        <span>Paste a YouTube URL and hit Preview</span>
      </div>
    </div>

    <div class="transport-bar">
      <button onclick="prevClip()">&#9664;&#9664;</button>
      <button onclick="playClipAt(currentClipIndex)" id="btn-play">&#9654;</button>
      <button onclick="nextClip()">&#9654;&#9654;</button>
      <button onclick="playAll()" id="btn-playall">&#9654; ALL</button>
      <span class="info-display" id="info-display">No clips loaded</span>
      <button class="rec" id="btn-rec" onclick="toggleRecord()">&#9679; REC</button>
    </div>

    <div class="timeline-strip" id="timeline-strip">
      <span class="timeline-empty">Clips appear here as a timeline</span>
    </div>
  </div>

  <div class="sidebar">
    <div class="sidebar-tabs">
      <button class="sidebar-tab active" onclick="switchTab('add',this)">Add Clip</button>
      <button class="sidebar-tab" onclick="switchTab('clips',this)">Clips</button>
      <button class="sidebar-tab" onclick="switchTab('export',this)">Export</button>
    </div>
    <div class="sidebar-content">

      <!-- ADD PANEL -->
      <div class="panel active" id="panel-add">
        <div class="form-group">
          <label class="form-label">Source Type</label>
          <select class="form-input" id="source-type" onchange="updateSourceUI()">
            <option value="youtube">YouTube</option>
            <option value="gdrive">Google Drive</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label" id="url-label">YouTube URL</label>
          <input class="form-input" id="clip-url" placeholder="https://youtu.be/... or youtube.com/watch?v=..." />
        </div>
        <div class="form-group">
          <label class="form-label">Clip Label (optional)</label>
          <input class="form-input" id="clip-label-input" placeholder="e.g. Suzuki Roshi on beginner's mind" />
        </div>
        <div class="form-group">
          <label class="form-label">Time Window (seconds)</label>
          <div class="time-inputs">
            <input class="form-input" id="clip-start" type="number" placeholder="Start: 0" min="0" step="1" />
            <input class="form-input" id="clip-end" type="number" placeholder="End: 10" min="0" step="1" />
          </div>
        </div>
        <div class="form-group">
          <button class="btn" onclick="previewFromForm()">Preview Clip</button>
        </div>
        <div class="form-group">
          <button class="btn btn-secondary" onclick="addClip()">Add to Sequence</button>
        </div>
        <div class="status-msg" id="add-status"></div>
        <div class="note-box">
          YouTube clips use embed with start/end parameters.
          The video plays within your chosen window.
          Use Preview to check your timing before adding.
        </div>
      </div>

      <!-- CLIPS PANEL -->
      <div class="panel" id="panel-clips">
        <div class="clip-list" id="clip-list">
          <span class="timeline-empty">No clips yet. Add some.</span>
        </div>
        <div class="tweak-section" id="tweak-section" style="display:none;">
          <label class="form-label">Tweak Selected Clip</label>
          <div class="range-row">
            <span style="color:var(--text-dim);font-size:10px;">START</span>
            <input type="range" id="tweak-start" min="0" max="600" step="1" oninput="tweakClip()">
            <span class="range-val" id="tweak-start-val">0</span>
          </div>
          <div class="range-row">
            <span style="color:var(--text-dim);font-size:10px;">END</span>
            <input type="range" id="tweak-end" min="0" max="600" step="1" oninput="tweakClip()">
            <span class="range-val" id="tweak-end-val">0</span>
          </div>
          <button class="btn" onclick="previewSelected()" style="margin-top:8px;">Preview Tweak</button>
        </div>
      </div>

      <!-- EXPORT PANEL -->
      <div class="panel" id="panel-export">
        <div class="form-group">
          <label class="form-label">Export Options</label>
          <button class="btn" onclick="exportBloggerCode()">Copy Blogger HTML</button>
        </div>
        <div class="form-group">
          <button class="btn btn-secondary" onclick="exportJSON()">Copy Playlist JSON</button>
        </div>
        <div class="form-group">
          <button class="btn btn-secondary" onclick="importJSON()">Import Playlist JSON</button>
        </div>
        <div class="status-msg" id="export-status"></div>
      </div>
    </div>
  </div>
</div>

<script>
/* ─────── STATE ─────── */
let clips = [];
let currentClipIndex = -1;
let playAllMode = false;
let autoAdvanceTimer = null;
let mediaRecorder = null;
let recordedChunks = [];
let isRecording = false;

/* ─────── URL PARSING ─────── */
function extractYouTubeID(url) {
  if (!url) return null;
  url = url.trim();
  let m;
  m = url.match(/youtube\.com\/watch\?v=([a-zA-Z0-9_-]{11})/); if (m) return m[1];
  m = url.match(/youtu\.be\/([a-zA-Z0-9_-]{11})/); if (m) return m[1];
  m = url.match(/youtube\.com\/embed\/([a-zA-Z0-9_-]{11})/); if (m) return m[1];
  m = url.match(/^([a-zA-Z0-9_-]{11})$/); if (m) return m[1];
  return null;
}

function extractDriveID(url) {
  if (!url) return null;
  const m = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
  return m ? m[1] : null;
}

/* ─────── YOUTUBE EMBED (no API needed) ─────── */
function buildYTEmbedURL(videoId, start, end, autoplay) {
  // Using YouTube's embed URL with start/end params - works everywhere including file://
  let url = 'https://www.youtube.com/embed/' + videoId + '?';
  const params = [];
  if (start) params.push('start=' + Math.floor(start));
  if (end) params.push('end=' + Math.floor(end));
  if (autoplay) params.push('autoplay=1');
  params.push('rel=0');
  params.push('modestbranding=1');
  return url + params.join('&');
}

function loadYouTube(videoId, start, end, autoplay) {
  const frame = document.getElementById('yt-frame');
  const driveEl = document.getElementById('drive-player');

  driveEl.style.display = 'none';
  driveEl.pause();
  frame.style.display = 'block';

  document.getElementById('player-placeholder').classList.add('hidden');

  const src = buildYTEmbedURL(videoId, start, end, autoplay);
  frame.src = src;

  // Set up auto-advance timer for Play All mode
  if (playAllMode && start !== undefined && end !== undefined) {
    clearTimeout(autoAdvanceTimer);
    const duration = (end - start) * 1000;
    autoAdvanceTimer = setTimeout(() => {
      nextClip();
    }, duration + 1500); // small buffer for load time
  }
}

function loadDrive(fileId, start, end) {
  const frame = document.getElementById('yt-frame');
  const driveEl = document.getElementById('drive-player');

  frame.style.display = 'none';
  frame.src = '';
  driveEl.style.display = 'block';

  document.getElementById('player-placeholder').classList.add('hidden');

  driveEl.src = 'https://drive.google.com/uc?export=download&id=' + fileId;
  driveEl.onloadeddata = () => {
    driveEl.currentTime = start || 0;
    driveEl.play();
  };
}

/* ─────── STATUS ─────── */
function setStatus(id, msg, isError) {
  const el = document.getElementById(id);
  if (!el) return;
  el.textContent = msg;
  el.className = 'status-msg' + (isError ? ' error' : '');
  if (msg) setTimeout(() => { if (el.textContent === msg) el.textContent = ''; }, 5000);
}

function updateInfo(text) {
  document.getElementById('info-display').textContent = text;
}

/* ─────── SOURCE UI ─────── */
function updateSourceUI() {
  const t = document.getElementById('source-type').value;
  document.getElementById('url-label').textContent = t === 'youtube' ? 'YouTube URL' : 'Google Drive Share Link';
  document.getElementById('clip-url').placeholder = t === 'youtube'
    ? 'https://youtu.be/... or youtube.com/watch?v=...'
    : 'https://drive.google.com/file/d/.../view';
}

function formatTime(s) {
  if (!s || isNaN(s)) return '0:00';
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return m + ':' + (sec < 10 ? '0' : '') + sec;
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

/* ─────── PREVIEW FROM FORM ─────── */
function previewFromForm() {
  const type = document.getElementById('source-type').value;
  const url = document.getElementById('clip-url').value.trim();
  const start = parseFloat(document.getElementById('clip-start').value) || 0;
  const end = parseFloat(document.getElementById('clip-end').value) || (start + 10);

  if (!url) { setStatus('add-status', 'Paste a URL first', true); return; }

  if (type === 'youtube') {
    const vid = extractYouTubeID(url);
    if (!vid) { setStatus('add-status', 'Cannot parse that URL. Try the full youtube.com link.', true); return; }
    loadYouTube(vid, start, end, true);
    updateInfo('Preview: ' + formatTime(start) + ' \u2192 ' + formatTime(end));
    setStatus('add-status', 'Loading preview...');
  } else {
    const fid = extractDriveID(url);
    if (!fid) { setStatus('add-status', 'Cannot parse Drive URL', true); return; }
    loadDrive(fid, start, end);
    updateInfo('Preview: ' + formatTime(start) + ' \u2192 ' + formatTime(end));
    setStatus('add-status', 'Loading Drive video...');
  }
}

/* ─────── ADD CLIP ─────── */
function addClip() {
  const type = document.getElementById('source-type').value;
  const url = document.getElementById('clip-url').value.trim();
  const start = parseFloat(document.getElementById('clip-start').value) || 0;
  const end = parseFloat(document.getElementById('clip-end').value) || (start + 10);
  const label = document.getElementById('clip-label-input').value.trim();

  if (!url) { setStatus('add-status', 'Paste a URL first', true); return; }

  let sourceId;
  if (type === 'youtube') {
    sourceId = extractYouTubeID(url);
    if (!sourceId) { setStatus('add-status', 'Cannot parse YouTube URL', true); return; }
  } else {
    sourceId = extractDriveID(url);
    if (!sourceId) { setStatus('add-status', 'Cannot parse Drive URL', true); return; }
  }

  clips.push({
    type, sourceId, url, start, end,
    label: label || (type === 'youtube' ? 'YT Clip ' : 'Drive Clip ') + (clips.length + 1)
  });

  document.getElementById('clip-url').value = '';
  document.getElementById('clip-start').value = '';
  document.getElementById('clip-end').value = '';
  document.getElementById('clip-label-input').value = '';

  setStatus('add-status', 'Added! (' + clips.length + ' clips in sequence)');
  renderClipList();
  renderTimeline();
}

/* ─────── RENDER ─────── */
function renderClipList() {
  const el = document.getElementById('clip-list');
  if (!clips.length) {
    el.innerHTML = '<span class="timeline-empty">No clips yet. Add some.</span>';
    document.getElementById('tweak-section').style.display = 'none';
    return;
  }
  el.innerHTML = clips.map((c, i) => `
    <div class="clip-item ${i === currentClipIndex ? 'active' : ''}" onclick="selectClip(${i})"
         draggable="true" ondragstart="dragStart(event,${i})" ondragover="dragOver(event)" ondrop="dropClip(event,${i})">
      <div class="clip-item-header">
        <span class="clip-item-title">${i + 1}. ${esc(c.label)}</span>
        <span class="clip-item-badge ${c.type === 'youtube' ? 'badge-yt' : 'badge-drive'}">${c.type === 'youtube' ? 'YT' : 'Drive'}</span>
      </div>
      <div class="clip-item-time">${formatTime(c.start)} \u2192 ${formatTime(c.end)} (${(c.end - c.start).toFixed(0)}s)</div>
      <div class="clip-item-actions">
        <button onclick="event.stopPropagation();playClipAt(${i})">&#9654;</button>
        <button onclick="event.stopPropagation();moveClip(${i},-1)">\u2191</button>
        <button onclick="event.stopPropagation();moveClip(${i},1)">\u2193</button>
        <button onclick="event.stopPropagation();duplicateClip(${i})">Dup</button>
        <button class="del" onclick="event.stopPropagation();removeClip(${i})">\u2715</button>
      </div>
    </div>
  `).join('');
}

function renderTimeline() {
  const el = document.getElementById('timeline-strip');
  if (!clips.length) {
    el.innerHTML = '<span class="timeline-empty">Clips appear here as a timeline</span>';
    return;
  }
  el.innerHTML = clips.map((c, i) => `
    <div class="timeline-chip ${i === currentClipIndex ? 'active' : ''}" onclick="playClipAt(${i})">
      ${i + 1}. ${esc(c.label).substring(0, 18)}
    </div>
  `).join('');
}

/* ─────── CLIP OPS ─────── */
function selectClip(i) {
  currentClipIndex = i;
  renderClipList();
  renderTimeline();
  const c = clips[i];
  document.getElementById('tweak-section').style.display = 'block';
  const ss = document.getElementById('tweak-start');
  const se = document.getElementById('tweak-end');
  const mx = Math.max(c.end + 120, 600);
  ss.max = mx; se.max = mx;
  ss.value = c.start; se.value = c.end;
  document.getElementById('tweak-start-val').textContent = Math.floor(c.start);
  document.getElementById('tweak-end-val').textContent = Math.floor(c.end);
}

function tweakClip() {
  if (currentClipIndex < 0) return;
  const s = parseFloat(document.getElementById('tweak-start').value);
  const e = parseFloat(document.getElementById('tweak-end').value);
  document.getElementById('tweak-start-val').textContent = Math.floor(s);
  document.getElementById('tweak-end-val').textContent = Math.floor(e);
  clips[currentClipIndex].start = s;
  clips[currentClipIndex].end = Math.max(e, s + 1);
  renderClipList();
  renderTimeline();
}

function previewSelected() {
  if (currentClipIndex >= 0) playClipAt(currentClipIndex);
}

function removeClip(i) {
  clips.splice(i, 1);
  if (currentClipIndex >= clips.length) currentClipIndex = clips.length - 1;
  renderClipList();
  renderTimeline();
}

function moveClip(i, dir) {
  const j = i + dir;
  if (j < 0 || j >= clips.length) return;
  [clips[i], clips[j]] = [clips[j], clips[i]];
  if (currentClipIndex === i) currentClipIndex = j;
  renderClipList();
  renderTimeline();
}

function duplicateClip(i) {
  clips.splice(i + 1, 0, { ...clips[i], label: clips[i].label + ' (copy)' });
  renderClipList();
  renderTimeline();
}

let dragIdx = -1;
function dragStart(e, i) { dragIdx = i; e.dataTransfer.effectAllowed = 'move'; }
function dragOver(e) { e.preventDefault(); }
function dropClip(e, i) {
  e.preventDefault();
  if (dragIdx === i) return;
  const item = clips.splice(dragIdx, 1)[0];
  clips.splice(i, 0, item);
  currentClipIndex = i;
  renderClipList();
  renderTimeline();
}

/* ─────── PLAYBACK ─────── */
function playClipAt(i) {
  if (i < 0 || i >= clips.length) return;
  clearTimeout(autoAdvanceTimer);
  currentClipIndex = i;
  const c = clips[i];

  updateInfo('Clip ' + (i + 1) + '/' + clips.length + ': ' + c.label);

  if (c.type === 'youtube') {
    loadYouTube(c.sourceId, c.start, c.end, true);
  } else {
    loadDrive(c.sourceId, c.start, c.end);
  }

  renderClipList();
  renderTimeline();
}

function nextClip() {
  clearTimeout(autoAdvanceTimer);
  if (currentClipIndex < clips.length - 1) {
    playClipAt(currentClipIndex + 1);
  } else {
    playAllMode = false;
    document.getElementById('btn-playall').classList.remove('active');
    updateInfo('Sequence complete');
  }
}

function prevClip() {
  clearTimeout(autoAdvanceTimer);
  if (currentClipIndex > 0) playClipAt(currentClipIndex - 1);
}

function playAll() {
  if (!clips.length) return;
  playAllMode = !playAllMode;
  document.getElementById('btn-playall').classList.toggle('active', playAllMode);
  if (playAllMode) playClipAt(0);
}

/* ─────── RECORDING ─────── */
async function toggleRecord() {
  const btn = document.getElementById('btn-rec');
  if (!isRecording) {
    try {
      const stream = await navigator.mediaDevices.getDisplayMedia({ video: { cursor: 'never' }, audio: true });
      recordedChunks = [];
      mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
      mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
      mediaRecorder.onstop = () => {
        const blob = new Blob(recordedChunks, { type: 'video/webm' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'clip-sequence-' + Date.now() + '.webm';
        a.click();
        stream.getTracks().forEach(t => t.stop());
      };
      mediaRecorder.start();
      isRecording = true;
      btn.classList.add('recording');
      btn.innerHTML = '&#9632; STOP';
    } catch (err) {
      alert('Recording needs screen share permission.');
    }
  } else {
    mediaRecorder.stop();
    isRecording = false;
    btn.classList.remove('recording');
    btn.innerHTML = '&#9679; REC';
  }
}

/* ─────── EXPORT ─────── */
function exportBloggerCode() {
  if (!clips.length) { setStatus('export-status', 'No clips', true); return; }
  let h = '<!-- Clip Sequencer Playlist -->\n';
  h += '<div id="cs-player" style="width:100%;max-width:640px;margin:auto;background:#000;aspect-ratio:16/9;">\n';
  h += '  <iframe id="cs-frame" style="width:100%;height:100%;border:none;" allow="autoplay;encrypted-media" allowfullscreen></iframe>\n';
  h += '</div>\n';
  h += '<div style="text-align:center;margin-top:10px;">\n';
  clips.forEach((c, i) => {
    h += '  <button onclick="csPlay(' + i + ')" style="padding:5px 15px;margin:2px;">' + esc(c.label) + '</button>\n';
  });
  h += '  <button onclick="csPlayAll()" style="padding:5px 15px;margin:2px;font-weight:bold;">Play All</button>\n';
  h += '</div>\n';
  h += '<script>\n';
  h += 'var csList=' + JSON.stringify(clips.map(c => ({ id: c.sourceId, start: c.start, end: c.end, label: c.label }))) + ';\n';
  h += 'var csIdx=0,csAuto=false,csTmr;\n';
  h += 'function csPlay(i){csIdx=i;var c=csList[i];clearTimeout(csTmr);\n';
  h += '  document.getElementById("cs-frame").src="https://www.youtube.com/embed/"+c.id+"?autoplay=1&start="+Math.floor(c.start)+"&end="+Math.floor(c.end)+"&rel=0";\n';
  h += '  if(csAuto){csTmr=setTimeout(function(){csIdx++;if(csIdx<csList.length)csPlay(csIdx);else csAuto=false},(c.end-c.start)*1000+1500)}}\n';
  h += 'function csPlayAll(){csAuto=true;csPlay(0)}\n';
  h += '<\/script>';

  navigator.clipboard.writeText(h)
    .then(() => setStatus('export-status', 'Blogger HTML copied'))
    .catch(() => setStatus('export-status', 'Clipboard failed', true));
}

function exportJSON() {
  if (!clips.length) { setStatus('export-status', 'No clips', true); return; }
  navigator.clipboard.writeText(JSON.stringify(clips, null, 2))
    .then(() => setStatus('export-status', 'JSON copied'))
    .catch(() => setStatus('export-status', 'Clipboard failed', true));
}

function importJSON() {
  const inp = prompt('Paste playlist JSON:');
  if (!inp) return;
  try {
    const d = JSON.parse(inp);
    if (Array.isArray(d)) {
      clips = d;
      currentClipIndex = -1;
      renderClipList();
      renderTimeline();
      setStatus('export-status', 'Imported ' + clips.length + ' clips');
    }
  } catch (e) { setStatus('export-status', 'Invalid JSON', true); }
}

/* ─────── TABS ─────── */
function switchTab(name, btn) {
  document.querySelectorAll('.sidebar-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  if (btn) btn.classList.add('active');
  document.getElementById('panel-' + name).classList.add('active');
}

/* ─────── DRIVE TIME ENFORCEMENT ─────── */
document.getElementById('drive-player').addEventListener('timeupdate', function () {
  if (currentClipIndex < 0 || !clips[currentClipIndex] || clips[currentClipIndex].type !== 'gdrive') return;
  const c = clips[currentClipIndex];
  if (this.currentTime >= c.end) {
    if (playAllMode) nextClip();
    else { this.pause(); }
  }
});
</script>
